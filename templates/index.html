<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <h1>Iniciar sesión</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <label>Usuario:</label>
        <input type="text" name="username"><br><br>

        <label>Contraseña:</label>
        <input type="text" name="password"><br><br>

        <button type="submit">Entrar</button>
    </form>
</body>
</html>
